<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김포 비번 모음집</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 상단 내비게이션바 */
        .nav-header {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .breadcrumb {
            font-size: 0.9rem;
            color: #00e676;
            margin-bottom: 10px;
            font-weight: 700;
            min-height: 20px;
        }

        .btn-nav-group {
            display: flex;
            gap: 10px;
        }

        .btn-control {
            background-color: #333;
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            flex: 1;
        }

        .btn-control:active {
            background-color: #444;
        }

        /* 메뉴 구역 */
        .menu-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #aaa;
            font-weight: 700;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* 공통 비밀번호 상단 고정 박스 */
        .common-pw-box {
            grid-column: span 2;
            background-color: #1e1e1e;
            border: 2px solid #00e676;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .common-title {
            font-size: 0.95rem;
            color: #00e676;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .common-pw {
            font-size: 2.2rem;
            font-weight: 700;
            color: #00e676;
            background-color: #252525;
            padding: 10px;
            border-radius: 8px;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .common-memo {
            font-size: 0.95rem;
            color: #ffb300;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        /* 이미지 공통 테두리 스타일 */
        .img-wrap {
            margin-top: 15px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
            background-color: #000;
        }

        .img-wrap img {
            width: 100%;
            display: block;
            height: auto;
        }

        /* 일반 동 버튼 스타일 */
        .btn-menu {
            background-color: #1e1e1e;
            color: #fff;
            border: 2px solid #2a2a2a;
            padding: 20px 10px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 5px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }

        .btn-menu:active {
            background-color: #00e676;
            color: #000;
            border-color: #00e676;
        }

        /* 최종 결과 카드 스타일 */
        .result-view {
            display: none;
        }

        .card {
            background-color: #1e1e1e;
            border-left: 6px solid #00e676;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .card-header {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .dong-badge {
            font-size: 1.1rem;
            background: #333;
            padding: 6px 12px;
            border-radius: 6px;
            color: #00e676;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 15px;
        }

        .password-box {
            font-size: 2.2rem;
            font-weight: 700;
            color: #00e676;
            background-color: #252525;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .memo-box {
            font-size: 1rem;
            color: #ffb300;
            background: rgba(255, 179, 0, 0.1);
            padding: 12px;
            border-radius: 8px;
            line-height: 1.4;
        }
    </style>
</head>

                    <img id="resImg" src="" alt="동별 상세 이미지">
                </div>
            </div>
        </div>
    </div>

            { region: "마산동", type: "아파트", name: "동일스위트 2차", dong: "공통", pw: "", memo: "비번 바뀌면 알려주세요" },
            { region: "마산동", type: "아파트", name: "블루힐", dong: "공통", pw: "7638", memo: "비번 바뀌면 알려주세요" },


            { region: "마산동", type: "오피스텔", name: "골든하임", dong: "공통", pw: "3층4444 4층5555 5층6666", memo: "(층마다업해서ex:4층5555) 비번 바뀌면 알려주세요" },


            { region: "장기동", type: "아파트", name: "한강센트럴자이 1단지", dong: "공통", pw: "", memo: "비번 바뀌면 알려주세요" },
            { region: "장기동", type: "아파트", name: "한강센트럴자이 1단지", dong: "101동", pw: "1301동동0000", memo: "비번 바뀌면 알려주세요" },

            { region: "장기동", type: "오피스텔", name: "", dong: "공통", pw: "", memo: "비번 바뀌면 알려주세요" },
            


            { region: "운양동", type: "아파트", name: "이랜드타운힐스", dong: "공통", pw: "##5970", memo: "비번 바뀌면 알려주세요" },

            { region: "운양동", type: "오피스텔", name: "", dong: "공통", pw: "", memo: "비번 바뀌면 알려주세요" }
        ];

        let currentStep = 1; 
        let selectedRegion = "";
        let selectedType = "";
        let selectedName = "";
        let selectedDong = "";

        function initApp() {
            showStep1();
        }

        // 🔍 실시간 통합 검색 기능 (전체 데이터 대상)
        function searchApt() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const menuTitle = document.getElementById('menuTitle');
            const buttonGrid = document.getElementById('buttonGrid');
            const pathDisplay = document.getElementById('pathDisplay');

            // 검색어가 비어 있으면 현재 보던 단계 페이지 복원
            if (query === "") {
                if (currentStep === 1) showStep1();
                else if (currentStep === 2) showStep2();
                else if (currentStep === 3) showStep3();
                else if (currentStep === 4) showStep4();
                else if (currentStep === 5) showStep5();
                return;
            }

            // 검색어 입력 시 결과 뷰 창은 닫고 메뉴 그리드를 오픈
            document.getElementById('menuZone').style.display = "block";
            document.getElementById('resultZone').style.display = "none";
            
            menuTitle.innerText = `🔍 "${query}" 검색 결과`;
            pathDisplay.innerText = "통합 검색 중...";

            // 전체 데이터 중 건물 이름(name)에 검색어가 포함된 것 필터링 (이름 없는 빈 데이터 제외)
            const filtered = deliveryData.filter(item => 
                item.name && item.name.toLowerCase().includes(query)
            );

            // 중복 출력 방지 (지역 + 형태 + 건물명 조합 기준)
            const uniqueResults = [];
            const seen = new Set();

            filtered.forEach(item => {
                const key = `${item.region}|${item.type}|${item.name}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    uniqueResults.push(item);
                }
            });

            if (uniqueResults.length === 0) {
                buttonGrid.innerHTML = `<div style="grid-column: span 2; text-align:center; color:#aaa; padding:20px;">검색 결과가 없습니다.</div>`;
                return;
            }

            // 매칭된 검색 리스트 버튼 렌더링
            let html = "";
            uniqueResults.forEach(item => {
                html += `
                    <button class="btn-menu" style="font-size:0.9rem; padding: 15px 8px; text-align:left;" 
                            onclick="clickSearchResult('${item.region}', '${item.type}', '${item.name}')">
                        <span style="color:#00e676; font-size:0.75rem;">[${item.region} ${item.type}]</span><br>
                        ${item.name}
                    </button>
                `;
            });
            buttonGrid.innerHTML = html;
        }

        // 검색된 항목 선택 시 해당 아파트 상세 특이사항(Step 4)으로 직행
        function clickSearchResult(region, type, name) {
            selectedRegion = region;
            selectedType = type;
            selectedName = name;
            
            document.getElementById('searchInput').value = ""; // 검색창 리셋
            showStep4();
        }

        // 1단계: 지역 선택
        function showStep1() {
            currentStep = 1;
            document.getElementById('menuZone').style.display = "block";
            document.getElementById('resultZone').style.display = "none";
            document.getElementById('menuTitle').innerText = "📍 배달 지역 선택";
            document.getElementById('pathDisplay').innerText = "홈";

            const regions = [...new Set(deliveryData.map(item => item.region))];
            let html = "";
            regions.forEach(r => {
                html += `<button class="btn-menu" onclick="selectRegion('${r}')">${r}</button>`;
            });
            document.getElementById('buttonGrid').innerHTML = html;
        }

        function selectRegion(region) {
            selectedRegion = region;
            showStep2();
        }

        // 2단계: 건물 형태 선택
        function showStep2() {
            currentStep = 2;
            document.getElementById('menuZone').style.display = "block";
            document.getElementById('resultZone').style.display = "none";
            document.getElementById('menuTitle').innerText = "🏠 건물 형태 선택";
            document.getElementById('pathDisplay').innerText = `${selectedRegion}`;

            const filtered = deliveryData.filter(item => item.region === selectedRegion);
            const types = [...new Set(filtered.map(item => item.type))];

            let html = "";
            types.forEach(t => {
                html += `<button class="btn-menu" onclick="selectType('${t}')">${t}</button>`;
            });
            document.getElementById('buttonGrid').innerHTML = html;
        }

        function selectType(type) {
            selectedType = type;
            showStep3();
        }

        // 3단계: 아파트/건물 이름 선택
        function showStep3() {
            currentStep = 3;
            document.getElementById('menuZone').style.display = "block";
            document.getElementById('resultZone').style.display = "none";
            document.getElementById('menuTitle').innerText = "🏢 건물/아파트 이름 선택";
            document.getElementById('pathDisplay').innerText = `${selectedRegion} > ${selectedType}`;

            const filtered = deliveryData.filter(item => item.region === selectedRegion && item.type === selectedType);
            const names = [...new Set(filtered.map(item => item.name))];
            
            let html = "";
            names.forEach(n => {
                if(n) { 
                    html += `<button class="btn-menu" style="font-size:0.95rem;" onclick="selectName('${n}')">${n}</button>`;
                }
            });
            document.getElementById('buttonGrid').innerHTML = html;
        }

        function selectName(name) {
            selectedName = name;
            showStep4();
        }

        // 4단계: 동별 목록 (공통 비번 및 공통 이미지는 여기서 바로 보여줌)
        function showStep4() {
            currentStep = 4;
            document.getElementById('menuZone').style.display = "block";
            document.getElementById('resultZone').style.display = "none";
            document.getElementById('menuTitle').innerText = "🔢 동별 특이사항 선택";
            document.getElementById('pathDisplay').innerText = `${selectedRegion} > ${selectedType} > ${selectedName}`;

            const filtered = deliveryData.filter(item => item.region === selectedRegion && item.type === selectedType && item.name === selectedName);
            
            const commonData = filtered.find(item => item.dong === "공통");
            const dongData = filtered.filter(item => item.dong !== "공통");

            let html = "";

            if (commonData) {
                let imgHtml = "";
                if (commonData.img) {
                    imgHtml = `
                        <div class="img-wrap">
                            <img src="${commonData.img}" alt="배치도">
                        </div>
                    `;
                }

                html += `
                    <div class="common-pw-box">
                        <div class="common-title">📢 전동 공통 비밀번호</div>
                        <div class="common-pw">🔑 ${commonData.pw ? commonData.pw : '없음'}</div>
                        <div class="common-memo">💡 ${commonData.memo}</div>
                        ${imgHtml}
                    </div>
                `;
            }

            if (dongData.length > 0) {
                html += `<div style="grid-column: span 2; font-size: 0.9rem; color: #aaa; margin: 10px 0 5px 0; font-weight: bold;">동별 다른 비밀번호:</div>`;
                dongData.forEach(item => {
                    html += `<button class="btn-menu" style="color:#00e676; padding: 15px 5px; font-size: 1rem;" onclick="selectFinal('${item.dong}')">${item.dong}</button>`;
                });
            }
            
            document.getElementById('buttonGrid').innerHTML = html;
        }

        function selectFinal(dong) {
            selectedDong = dong;
            showStep5();
        }

        // 5단계: 개별 동 클릭 시 상세 화면 (여기에도 이미지 있으면 출력)
        function showStep5() {
            currentStep = 5;
            document.getElementById('menuZone').style.display = "none";
            document.getElementById('resultZone').style.display = "block";
            document.getElementById('pathDisplay').innerText = `${selectedRegion} > ${selectedType} > ${selectedName} > ${selectedDong}`;

            const finalData = deliveryData.find(item => item.region === selectedRegion && item.type === selectedType && item.name === selectedName && item.dong === selectedDong);

            if(finalData) {
                document.getElementById('resAptName').innerText = finalData.name;
                document.getElementById('resDong').innerText = `🚪 ${finalData.dong}`;
                document.getElementById('resPw').innerText = `🔑 ${finalData.pw}`;
                document.getElementById('resMemo').innerText = `💡 ${finalData.memo}`;

                const resImgContainer = document.getElementById('resImgContainer');
                const resImg = document.getElementById('resImg');
                if (finalData.img) {
                    resImg.src = finalData.img;
                    resImgContainer.style.display = "block";
                } else {
                    resImgContainer.style.display = "none";
                }
            }
        }

        function goBack() {
            if (document.getElementById('searchInput').value !== "") {
                document.getElementById('searchInput').value = "";
            }
            if (currentStep === 2) showStep1();
            else if (currentStep === 3) showStep2();
            else if (currentStep === 4) showStep3();
            else if (currentStep === 5) showStep4();
        }

        function resetToHome() {
            document.getElementById('searchInput').value = "";
            showStep1();
        }

        initApp();
    </script>
